---
- name: Install k9s on master nodes
  hosts: master
  become: yes
  tasks:

    - name: Download k9s release archive
      get_url:
        url: https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_amd64.tar.gz
        dest: /tmp/k9s.tar.gz
        mode: '0644'

    - name: Extract k9s binary
      unarchive:
        src: /tmp/k9s.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Move k9s binary to /usr/local/bin
      copy:
        src: /tmp/k9s
        dest: /usr/local/bin/k9s
        mode: '0755'
        remote_src: yes

    - name: Clean up temp files
      file:
        path: /tmp/k9s.tar.gz
        state: absent

    - name: Clean up extracted k9s binary
      file:
        path: /tmp/k9s
        state: absent
